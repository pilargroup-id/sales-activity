name: Deploy touchpoint.pilargroup.id

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build & Deploy to GCP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GCP_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} "
            set -e
            cd /var/www/touchpoint

            echo '>> Git pull'
            git pull origin main

            echo '>> Build frontend'
            cd frontend
            npm install
            npm run build

            echo '>> Backend'
            cd ../backend
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo '>> Reload nginx'
            sudo systemctl reload nginx
            echo '>> Deploy selesai'
          "